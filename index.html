<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="HabitPulse" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <title>HabitPulse System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#050B14',
              surface: '#0A192F',
              primary: '#4D9FFF',
              accent: '#8b5cf6',
              success: '#10b981',
              danger: '#ef4444',
              border: '#1E3A8A'
            },
            fontFamily: {
              sans: ['Roboto Condensed', 'sans-serif'],
              display: ['Teko', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@300;400;700&family=Teko:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      /* Custom Scrollbar for the widget feel */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0A192F; 
      }
      ::-webkit-scrollbar-thumb {
        background: #1E3A8A; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #4D9FFF; 
      }
      body {
        background-color: #050B14;
        color: #f8fafc;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registered with scope:', registration.scope);
            })
            .catch(error => {
              console.error('Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
